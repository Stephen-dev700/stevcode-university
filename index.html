<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StevCode University | Student Portal</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">
    <!-- Left Side -->
    <section class="left-panel">
        <div class="branding">
            <h1>StevCode University</h1>
            <p>
                Welcome to the Student Portal.
                Access your courses, assignments,
                grades, announcements and more.
            </p>
        </div>

        <div class="illustration">
            <img src="assets/images/login-hero.webp" alt="Developer workspace">
        </div>
    </section>


    <!-- Right Side -->
    <section class="right-panel">
        <div class="login-card">
            <h2>Welcome Back 👋</h2>
            <p>Please login to continue.</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="student-id">Student ID</label>
                    <input
                           id="student-id"
                            type="text"
                            placeholder="Enter Student ID">
                    <div class="error" id="student-id-error"></div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-box">
                        <input
                                type="password"
                                id="password"
                                placeholder="Enter Password">
                        <button
                                type="button"
                                class="show-password"
                                id="toggle-password">
                            👁
                        </button>
                    </div>
                    <div class="error" id="password-error"></div>
                </div>

                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>
                    <a href="#">
                        Forgot Password?
                    </a>
                </div>
                <div id="login-error" class="error"></div>
                <button
                        type="submit"
                        class="login-btn"
                id="login-btn">
                    Login
                </button>
            </form>
        </div>
    </section>
</div>



<script src="js/auth.js"></script>
<script src="js/users.js"></script>
<script src="js/login.js"></script>

</body>
</html>
